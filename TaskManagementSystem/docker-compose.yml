services:
  webapi:
    build: .
    container_name: dotnet-webapi
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Quote so `!` in the password is not parsed as a YAML tag (otherwise this env var is dropped and the app falls back to LocalDB).
      - "ConnectionStrings__DefaultConnection=Server=db;Database=TaskManagementDb;User=sa;Password=YourPassword123!;TrustServerCertificate=true"
      - JwtSettings__Issuer=http://localhost:5000
      - JwtSettings__Audience=http://localhost:5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webapi-network

  # Optional: Add a SQL Server database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dotnet-db
    environment:
      - ACCEPT_EULA=Y
      - "SA_PASSWORD=YourPassword123!"
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$${SA_PASSWORD}" -Q "SELECT 1" -b -o /dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - webapi-network

volumes:
  db_data:

networks:
  webapi-network:
    driver: bridge
